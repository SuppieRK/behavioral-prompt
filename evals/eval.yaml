prompt:
  candidate: PROMPT.md

default_targets:
  - local-pi
  - local-opencode-gpt55
  - local-codex-gpt55

targets:
  local-pi:
    harness: pi
    model: openai-codex/gpt-5.5
    reasoning: medium
    auth: configured
    planning:
      tool: todolist

  local-opencode-gpt55:
    harness: opencode
    model: openai/gpt-5.5
    reasoning: medium
    auth: configured
    planning:
      tool: todowrite
    agent:
      timeout:
        seconds: 300

  local-codex-gpt55:
    harness: codex
    model: gpt-5.5
    # Medium repeatedly skipped an existing local helper; high passed the
    # focused reproducer and the complete target matrix.
    reasoning: high
    auth: configured
    planning:
      tool: update_plan
    agent:
      timeout:
        seconds: 300

agent:
  timeout:
    seconds: 180

opencode:
  pure: true

reports:
  dir: evals/reports
