name: Bug report
description: Report a problem with the prompt, eval harness, or documentation.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, target name, and relevant files.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Target
      options:
        - Pi
        - OpenCode
        - Codex
        - Multiple targets
        - Eval harness
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation run
      description: Paste relevant command results. Do not include secrets.
    validations:
      required: false
